{% extends 'base.html' %}
{% block title %}Создание аккаунта — ПайсМобайл{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
{% set fd = form_data or {} %}
<section class="auth-wrap register-wrap">
  <form class="auth-card wide" method="post" novalidate>
    <h1>Создание аккаунта</h1>
    <p>Присоединитесь к божественной связи</p>
    <div class="two-cols">
      <label>Имя<input name="first_name" value="{{ fd.get('first_name', '') }}" placeholder="Ваше имя" required></label>
      <label>Фамилия<input name="last_name" value="{{ fd.get('last_name', '') }}" placeholder="Ваша фамилия" required></label>
    </div>
    <label>Номер телефона<input class="phone-mask" name="phone" value="{{ format_phone(fd.get('phone', '')) }}" placeholder="+7 (___) ___-__-__" inputmode="numeric" autocomplete="tel" required></label>
    <label>Email<input name="email" type="email" value="{{ fd.get('email', '') }}" placeholder="your@email.com" required></label>
    <div class="two-cols">
      <label>Пароль<input name="password" type="password" value="{{ fd.get('password', '') }}" placeholder="Минимум 8 символов" required></label>
      <label>Повторите<input name="password_confirm" type="password" value="{{ fd.get('password_confirm', '') }}" placeholder="Повторите пароль" required></label>
    </div>
    <label>Город
      <select name="city" required>
        <option value="">Выберите город из списка</option>
        {% for city in cities %}<option value="{{ city }}" {% if fd.get('city') == city %}selected{% endif %}>{{ city }}</option>{% endfor %}
      </select>
    </label>
    <button class="gold-btn full" type="submit">Зарегистрироваться</button>
    <p>Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
  </form>
</section>
{% endblock %}
